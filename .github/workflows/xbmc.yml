name: Repository

on:
  repository_dispatch:
    types: [generate]
  workflow_dispatch:

env:
  GH_REPOS: groggyegg/plugin.video.dramacool# groggyegg/plugin.video.duboku# groggyegg/repository.lime# groggyegg/script.module.peewee# groggyegg/script.module.xbmcext# soraxas/aznhusband.github.io#:src/plugin.video.icdrama
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    name: Generate
    steps:
      - uses: actions/checkout@v4
      - run: pip install gitpython
      - run: python <(curl https://raw.githubusercontent.com/chadparry/kodi-repository.chad.parry.org/master/tools/create_repository.py) $(for repo in $GH_REPOS; do printf "https://github.com/${repo//#/#$(gh api /repos/${repo%#*}/releases/latest | jq -r '.tag_name')} "; done)
      - run: git config user.name github-actions[bot]
      - run: git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - run: git add .
      - run: git commit --amend --reset-author --no-edit
      - run: git push --force
